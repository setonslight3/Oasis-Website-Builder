kind = "web"
previewPath = "/"
title = "OASIS"
version = "1.0.0"
id = "artifacts/oasis"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24457

[services.development]
run = "pnpm --filter @workspace/oasis run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/oasis", "run", "build" ]
publicDir = "artifacts/oasis/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24457"
BASE_PATH = "/"
